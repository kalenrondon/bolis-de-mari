<!DOCTYPE html>
<html>
<body style="background:white;color:black;font-family:sans-serif;padding:20px">

<div id="msg">ESPERANDO...</div>

<script>
"use strict";
var e = document.getElementById("msg");
e.textContent = "JS FUNCIONA! " + new Date();
e.style.color = "green";
e.style.fontSize = "24px";
e.style.fontWeight = "bold";

// Add test buttons
document.body.innerHTML += "<br><br><b>Sabores:</b><br>";
var sabores = ["Coco","Piña","Tamarindo","Limón","Corozo","Galleta","Bocadillo","Cola","Mango","Guanábana","Maracuyá","Hielo","Chocolate"];
for (var i = 0; i < sabores.length; i++) {
  document.body.innerHTML += '<button style="margin:3px;padding:8px 12px;border-radius:8px;border:1px solid #ccc;background:#f0f0f0;cursor:pointer">' + sabores[i] + '</button>';
}

document.body.innerHTML += "<br><br><b>Navegacion:</b><br>";
var tabs = ["Ventas","Historial","Stats","Fiados","Config"];
for (var i = 0; i < tabs.length; i++) {
  document.body.innerHTML += '<button style="margin:3px;padding:8px 16px;border-radius:8px;border:none;background:#FFD93D;font-weight:bold;cursor:pointer">' + tabs[i] + '</button>';
}
</script>

</body>
</html>
