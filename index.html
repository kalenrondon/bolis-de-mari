*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(160deg,#0a0f1e,#0d1b2a 40%,#112240);min-height:100vh;min-height:100dvh;font-family:Nunito,sans-serif;color:#fff;padding:10px 10px 80px;touch-action:manipulation;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:6px}
.logo-img{width:38px;height:38px;border-radius:8px;flex-shrink:0;object-fit:cover}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-txt{font-family:Pacifico,cursive;color:#FFD93D;font-size:20px}
.gan-wrap{text-align:right}
.gan-lbl{font-size:10px;color:rgba(255,255,255,.3)}
.gan-val{font-weight:900;color:#FFD93D;font-size:18px}
.nav{display:flex;gap:4px;margin-bottom:8px;position:sticky;top:0;z-index:10;background:#0a0f1e;padding:4px 0}
.nb{flex:1;padding:10px 0;border-radius:8px;border:none;font-weight:700;font-size:11px;text-align:center;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);cursor:pointer;min-height:44px}
.nb.on{background:#FFD93D;color:#0a0f1e}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px;margin-bottom:8px}
.ctit{font-size:13px;font-weight:800;color:rgba(255,255,255,.6);margin-bottom:8px}
.fila{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.emoji{font-size:24px;width:32px;text-align:center;flex-shrink:0}
.snombre{flex:1;font-weight:700;font-size:13px}
.sctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sctrl button{width:44px;height:44px;border-radius:10px;border:none;font-weight:900;font-size:20px;cursor:pointer}
.bm{background:rgba(255,100,100,.18);color:#FF8787}
.bp{background:rgba(107,203,119,.22);color:#6BCB77}
.scant{width:36px;text-align:center;font-weight:900;font-size:22px;color:#6BCB77}
.sgan{font-weight:800;font-size:13px;color:#FFD93D;min-width:55px;text-align:right}
.res{display:flex;justify-content:space-around;flex-wrap:wrap;gap:6px}
.col{text-align:center;min-width:70px;flex:1}
.lbl{font-size:10px;color:rgba(255,255,255,.3)}
.val{font-size:20px;font-weight:900}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#6BCB77;color:#fff;padding:8px 20px;border-radius:20px;font-weight:700;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.on{opacity:1}
button{cursor:pointer;font-family:Nunito,sans-serif}
.badge{font-size:10px;color:rgba(255,255,255,.3)}
/* Fiados - Boli Design */
.boli{display:flex;flex-direction:column;align-items:center;margin-bottom:10px}
.boli-body{background:linear-gradient(180deg,rgba(255,217,61,.12) 0%,rgba(107,203,119,.08) 100%);border:1px solid rgba(255,255,255,.1);border-radius:16px 16px 4px 4px;padding:8px 8px 6px;width:100%;position:relative}
.boli-stick{width:12px;height:14px;background:rgba(255,255,255,.12);border-radius:0 0 6px 6px;border:1px solid rgba(255,255,255,.08);border-top:none}
.boli-pagado .boli-body{background:linear-gradient(180deg,rgba(107,203,119,.18) 0%,rgba(107,203,119,.06) 100%);border-color:rgba(107,203,119,.25)}
.boli-pagado .boli-stick{background:rgba(107,203,119,.15);border-color:rgba(107,203,119,.2)}
.boli-name{font-weight:800;font-size:13px;text-align:center;margin-bottom:4px}
.boli-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.boli-ctrl{display:flex;align-items:center;gap:4px}
.boli-ctrl button{width:44px;height:44px;border-radius:50%;border:none;font-weight:900;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.boli-qty{min-width:28px;text-align:center;font-weight:900;font-size:18px;color:#6BCB77}
.boli-total{font-weight:900;font-size:16px;color:#FFD93D;min-width:60px;text-align:right}
.boli-badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-left:auto}
.boli-badge.pendiente{background:rgba(255,217,61,.15);color:#FFD93D}
.boli-badge.pagado{background:rgba(107,203,119,.15);color:#6BCB77}
.boli-actions{display:flex;justify-content:center;gap:6px;margin-top:6px}
.boli-actions button{padding:4px 10px;border-radius:6px;border:none;font-weight:700;font-size:10px;cursor:pointer}
.boli-date{font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-top:2px}
/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.minner{background:#0d1b2a;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow:auto}
.minner h3{font-size:15px;margin-bottom:12px}
.minner label{font-size:11px;color:rgba(255,255,255,.4);display:block;margin:8px 0 3px}
.minner input,.minner select{width:100%;padding:9px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:13px;font-family:Nunito,sans-serif;outline:none}
.minner input:focus{border-color:#4D96FF}
.mbtn{display:flex;gap:8px;margin-top:14px}
.mbtn button{flex:1;padding:10px;border-radius:8px;border:none;font-weight:800;font-size:12px;cursor:pointer}
@media(max-width:400px){.logo-txt{font-size:17px}.val{font-size:17px}}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo-wrap">
    <img src="logo.png" alt="Logo" class="logo-img">
    <div><div class="logo-txt">Bolis de Mari</div></div>
  </div>
  <div class="gan-wrap">
    <div class="gan-lbl">Hoy</div>
    <div class="gan-val" id="ganHoy">$0</div>
  </div>
</div>
<div class="badge" id="badge">💾 Local</div>
<div id="biblia" style="padding:8px 8px 6px;margin-bottom:6px;text-align:center;font-size:12px;color:rgba(255,217,61,.8);font-style:italic;line-height:1.4;background:rgba(255,217,61,.08);border:1px solid rgba(255,217,61,.15);border-radius:10px;font-weight:600"></div>

<div class="nav">
  <button class="nb on" id="nb-ventas" onclick="ir('ventas')" title="Ventas del día">🧊 Ventas</button>
  <button class="nb" id="nb-fiados" onclick="ir('fiados')" title="Clientes con crédito">📒 Fiados</button>
  <button class="nb" id="nb-historial" onclick="ir('historial')" title="Historial por día">📅 Historial</button>
  <button class="nb" id="nb-stats" onclick="ir('stats')" title="Estadísticas">📊 Stats</button>
  <button class="nb" id="nb-config" onclick="ir('config')" title="Configuración">⚙️ Config</button>
</div>

<div id="v-ventas">
  <div id="semanal" style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:4px"></div>
  <div class="card res" id="resumen">
    <div class="col"><div class="lbl">Vendidos</div><div class="val" style="color:#6BCB77" id="r-total">0</div></div>
    <div class="col"><div class="lbl">Ganancia</div><div class="val" style="color:#FFD93D" id="r-gan">$0</div></div>
    <div class="col"><div class="lbl">Prom/dia</div><div class="val" style="color:#4D96FF" id="r-prom">0</div></div>
    <div class="col"><div class="lbl">Prom $</div><div class="val" style="color:#C77DFF" id="r-promgan">$0</div></div>
  </div>
  <div id="lista-sabores"></div>
</div>

<div id="v-historial" style="display:none">
  <div class="ctit">📅 Historial (<span id="ndias">0</span> dias)</div>
  <input id="hist-search" placeholder="Buscar fecha (ej: Mar 2026)" oninput="debounceHistorial()" style="width:100%;padding:12px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:Nunito,sans-serif;outline:none;margin-bottom:8px">
  <div id="lista-hist"></div>
</div>

<div id="v-stats" style="display:none">
  <div style="display:flex;gap:4px;margin-bottom:8px">
    <button class="nb on" id="st-res" onclick="stView('res')" style="flex:1;padding:7px 0;border-radius:6px;border:none;font-weight:700;font-size:11px;text-align:center;cursor:pointer;background:#FFD93D;color:#0a0f1e">📊 Resumen</button>
    <button class="nb" id="st-mes" onclick="stView('mes')" style="flex:1;padding:7px 0;border-radius:6px;border:none;font-weight:700;font-size:11px;text-align:center;cursor:pointer;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)">📅 Por Mes</button>
    <button class="nb" id="st-sab" onclick="stView('sab')" style="flex:1;padding:7px 0;border-radius:6px;border:none;font-weight:700;font-size:11px;text-align:center;cursor:pointer;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)">🏆 Por Sabor</button>
  </div>
  <div id="st-resumen" class="card"><div class="ctit">📊 Resumen General</div><div id="kpis" style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:6px"></div></div>
  <div id="st-meses" style="display:none"><div class="ctit">📅 Ventas por Mes</div><div id="lista-meses"></div></div>
  <div id="st-sabores" style="display:none"><div id="ranking" class="card"></div></div>
</div>

<div id="v-fiados" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div class="ctit" style="margin:0">📒 Fiados</div>
    <div style="display:flex;gap:4px">
      <button onclick="toggleHistorialFiados()" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:none;padding:6px 10px;border-radius:6px;font-weight:700;font-size:11px;cursor:pointer" id="btn-hist-fiados">📜 Historial</button>
    </div>
  </div>
  <div class="card res">
    <div class="col"><div class="lbl">Pendiente</div><div class="val" id="f-pendiente" style="color:#FFD93D">$0</div></div>
    <div class="col"><div class="lbl">Activos</div><div class="val" id="f-activos" style="color:#FF9F1C">0</div></div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <input id="fiado-input" placeholder="Nombre del cliente" maxlength="60" style="flex:1;padding:9px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:13px;font-family:Nunito,sans-serif;outline:none">
    <button onclick="agregarFiado()" style="background:#FFD93D;color:#000;border:none;padding:9px 16px;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer">+ Agregar</button>
  </div>
  <div id="lista-fiados"></div>
</div>

<div id="v-config" style="display:none">
  <div class="ctit">⚙️ Configuración</div>
  <div class="card" style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.8">
    💾 Datos guardados localmente en este dispositivo<br>
    ☁️ <span id="cfg-supabase">Supabase no conectado</span><br>
    <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
      <button onclick="probarConexion()" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(107,203,119,.4);background:rgba(107,203,119,.15);color:#6BCB77;font-weight:700;font-size:11px;cursor:pointer">🔌 Probar conexion</button>
      <button onclick="exportarDatos()" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(77,150,255,.4);background:rgba(77,150,255,.15);color:#4D96FF;font-weight:700;font-size:11px;cursor:pointer">📥 Exportar datos</button>
    </div>
    <div id="cst" style="margin-top:6px;font-weight:700;display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function initSupabase() {
  if (supabase && typeof supabase.from === "function") return;
  var lib = window.supabase || window.supabaseJs;
  var f = null;
  if (typeof lib === "function") f = lib;
  else if (lib && typeof lib.createClient === "function") f = lib.createClient;
  if (f) {
    try {
      var c = f(SUPABASE_URL, SUPABASE_KEY);
      if (c && typeof c.from === "function") { supabase = c; actualizarEstadoSupabase(true); sincronizar(); }
    } catch(e) { console.warn("Supabase error:", e); }
  } else if (!window._supabaseLoading) {

}

async function sincronizar() {
  if (!supabase || syncing) return;
  syncing = true; loading(true);
  try {
    var dias = Object.keys(DB);
    for (var i = 0; i < dias.length; i++) {
      var f = dias[i], data = DB[f], row = {fecha:f};
      for (var j = 0; j < SABORES.length; j++) row[SABORES[j].id] = data[SABORES[j].id] || 0;
      var r = await supabase.from("ventas").upsert(row, {onConflict:"fecha"});
      if (r.error) console.warn("upsert error:", r.error);
    }
    var r2 = await supabase.from("ventas").select("*");
    if (!r2.error && r2.data) {
      var cambios = false;
      r2.data.forEach(function(rr) {
        var f = rr.fecha;
        if (!DB[f]) { DB[f] = {}; cambios = true; }
        for (var j = 0; j < SABORES.length; j++) {
          var vr = parseInt(rr[SABORES[j].id]) || 0;
          var vl = parseInt(DB[f][SABORES[j].id]) || 0;
          if (vr > vl) { DB[f][SABORES[j].id] = vr; cambios = true; }
        }
      });
      if (cambios) { guardar(); pintarTodo(); }
    }
    // Fiados sync (merge local + remoto)
    try {
      var fr = await supabase.from("fiados").select("*").order("id", {ascending:false});
      if (!fr.error && fr.data) {
        var localesPorId = {};
        for (var fi = 0; fi < fiados.length; fi++) localesPorId[fiados[fi].id] = fiados[fi];
        fr.data.forEach(function(fr) {
          if (localesPorId[fr.id]) {
            var l = localesPorId[fr.id];
            l.bolis = Math.max(l.bolis, fr.bolis || 0);
            if (fr.estado === "pagado") l.estado = "pagado";
          } else {
            fiados.push({id:fr.id,cliente:fr.cliente,bolis:fr.bolis||0,fecha:fr.fecha,estado:fr.estado});
          }
        });
        guardarFiadosLocal();
        if (vista === "fiados") pintarFiados();
      }
    } catch(fe) { console.warn("fiados sync:", fe); }
  }   catch(e) { console.warn("sync error:", e); }
  finally { syncing = false; loading(false); }
}

function programarSync() {
  if (supabase) { clearTimeout(window._st); window._st = setTimeout(sincronizar, 3000); }
}

async function probarConexion() {
  if (!supabase) { mostrarCSt("Supabase no disponible"); return; }
  try {
    var r = await supabase.from("ventas").select("fecha", {count:"exact",head:true});
    mostrarCSt(r.error ? "Error: "+r.error.message : "✅ Conexion exitosa", r.error ? "#FF8787" : "#6BCB77");
  } catch(e) { mostrarCSt(e.message, "#FF8787"); }
}

  el.textContent = msg; el.style.color = color || "#aaa";
  el.style.display = "block";
  setTimeout(function() { el.style.display = "none"; }, 3000);
}

function hoy() { var d = new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function cop(n) { return "$"+Number(n).toLocaleString("es-CO"); }
function fechaLinda(k) { if (!k) return ""; var p=k.split("-"); var M=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"]; return parseInt(p[2])+" "+M[parseInt(p[1])-1]+" "+p[0]; }

function getDia(k) { var d=DB[k]||{},o={}; for (var i=0;i<SABORES.length;i++) o[SABORES[i].id]=d[SABORES[i].id]||0; return o; }
function totales(k) { var d=getDia(k),b=0,g=0; for (var i=0;i<SABORES.length;i++) { b+=d[SABORES[i].id]; g+=d[SABORES[i].id]*SABORES[i].precio; } return {bolis:b,ganancia:g}; }

var _ac = null;
function beep() {
  try {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    var o = _ac.createOscillator();
    var g = _ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.frequency.value = 800; o.type = "sine";
    g.gain.setValueAtTime(0.1, _ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime + 0.1);
    o.start(_ac.currentTime); o.stop(_ac.currentTime + 0.1);
  } catch(e) {}
}

    e = document.getElementById("r-prom"); if (e) e.textContent = Math.round(tb/dias.length);
    e = document.getElementById("r-promgan"); if (e) e.textContent = cop(Math.round(tg/dias.length));
  }
  // Resumen semanal (semana empieza lunes)
  var semEl = document.getElementById("semanal");
  if (semEl) {
    var ahora = new Date();
    var diaSem = ahora.getDay(); // 0=domingo
    var diffLunes = diaSem === 0 ? 6 : diaSem - 1;
    var inicioSem = new Date(ahora); inicioSem.setDate(ahora.getDate() - diffLunes);
    var inicioSemPasada = new Date(inicioSem); inicioSemPasada.setDate(inicioSem.getDate() - 7);
    var swB = 0, swG = 0, spB = 0, spG = 0;
    for (var i = 0; i < dias.length; i++) {
      var dp = dias[i].split("-");
      var df = new Date(parseInt(dp[0]), parseInt(dp[1])-1, parseInt(dp[2]));
      var tt = totales(dias[i]);
      if (df >= inicioSem) { swB += tt.bolis; swG += tt.ganancia; }
      else if (df >= inicioSemPasada) { spB += tt.bolis; spG += tt.ganancia; }
    }
    var diff = swG - spG;
    var signo = diff >= 0 ? "📈" : "📉";
    semEl.innerHTML = "Esta semana: "+swB+" bolis · "+cop(swG)+"  |  Semana pasada: "+spB+" bolis · "+cop(spG)+"  "+signo+" "+cop(Math.abs(diff));
  }
  var lista = document.getElementById("lista-sabores");
  if (!lista) return;
  lista.innerHTML = "";
  for (var i = 0; i < SABORES.length; i++) {

    lista.appendChild(d);
  }

      if (sv > 0) saboresHtml += '<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span>'+SABORES[si].emoji+' '+SABORES[si].nombre+'</span><span style="color:#6BCB77">'+sv+'</span></div>';
    }
    d.innerHTML = '<div style="display:flex;justify-content:space-between" onclick="toggleHistDetalle(this)"><b>'+fechaTxt+'</b> <span style="color:#FFD93D;font-weight:900">'+cop(t.ganancia)+'</span></div><div style="font-size:11px;color:rgba(255,255,255,.3)">'+t.bolis+" bolis</div><div class='hist-det' style='display:none;margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:6px'>"+saboresHtml+"</div>";
    lista.appendChild(d);
  }
  if (filtro && mostrados === 0) lista.innerHTML = "<div class='card' style='text-align:center;color:rgba(255,255,255,.2);padding:30px'>Sin resultados para \""+filtro+"\"</div>";
}
function toggleHistDetalle(el) {
  var det = el.parentElement.querySelector(".hist-det");
  if (det) det.style.display = det.style.display === "none" ? "block" : "none";
}
function toggleMesDetalle(el) {
  var det = el.parentElement.querySelector(".mes-det");
  if (det) det.style.display = det.style.display === "none" ? "block" : "none";
}

function pintarStats() {
  var dias = Object.keys(DB).sort();
  var kpis = document.getElementById("kpis");
  if (!kpis) return;
  if (dias.length === 0) {
    var msg = "<div style='color:rgba(255,255,255,.3);padding:20px;text-align:center'>Registra ventas para ver estadisticas</div>";
    kpis.innerHTML = msg;
    document.getElementById("lista-meses").innerHTML = msg;
    document.getElementById("ranking").innerHTML = msg;
    return;
  }

  // --- RESUMEN ---
  var nd = dias.length, tg = 0, tb = 0;
  for (var i = 0; i < nd; i++) { var t = totales(dias[i]); tb += t.bolis; tg += t.ganancia; }
  var prom = Math.round(tg/nd);
  var promBolis = Math.round(tb/nd);
  kpis.innerHTML = '<div class="col"><div class="lbl">Total Bolis</div><div class="val" style="color:#6BCB77">'+tb+'</div></div><div class="col"><div class="lbl">Total $</div><div class="val" style="color:#FFD93D">'+cop(tg)+'</div></div><div class="col"><div class="lbl">Dias</div><div class="val" style="color:#4D96FF">'+nd+'</div></div><div class="col"><div class="lbl">Prom bolis/dia</div><div class="val" style="color:#C77DFF">'+promBolis+'</div></div><div class="col"><div class="lbl">Prom $/dia</div><div class="val" style="color:#FF9F1C">'+cop(prom)+'</div></div>';

  // --- POR MES ---
  var meses = {};
  for (var i = 0; i < dias.length; i++) {
    var mes = dias[i].substring(0, 7);
    if (!meses[mes]) meses[mes] = {bolis:0,ganancia:0,dias:0,sabores:{}};
    var t = totales(dias[i]);
    var dd = getDia(dias[i]);
    meses[mes].bolis += t.bolis;
    meses[mes].ganancia += t.ganancia;
    meses[mes].dias++;
    for (var si = 0; si < SABORES.length; si++) {
      var sv = dd[SABORES[si].id] || 0;
      if (sv > 0) meses[mes].sabores[SABORES[si].id] = (meses[mes].sabores[SABORES[si].id] || 0) + sv;
    }
  }
  var ordenMeses = Object.keys(meses).sort();
  var listaMeses = document.getElementById("lista-meses");
  if (listaMeses) {
    listaMeses.innerHTML = "";
    for (var i = ordenMeses.length - 1; i >= 0; i--) {
      var m = ordenMeses[i];
      var d = meses[m];
      var partes = m.split("-");
      var nomMes = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][parseInt(partes[1])-1];
      // Sabores del mes ordenados
      var sArr = [];
      for (var sid in d.sabores) sArr.push({id:sid,total:d.sabores[sid]});
      sArr.sort(function(a,b) { return b.total - a.total; });
      var best = sArr.length > 0 ? sArr[0] : null;
      var worst = sArr.length > 1 ? sArr[sArr.length-1] : null;
      var bestNom = "", worstNom = "";
      if (best) for (var si=0;si<SABORES.length;si++) if(SABORES[si].id===best.id) { bestNom = SABORES[si].emoji+" "+SABORES[si].nombre; break; }
      if (worst) for (var si=0;si<SABORES.length;si++) if(SABORES[si].id===worst.id) { worstNom = SABORES[si].emoji+" "+SABORES[si].nombre; break; }
      var saboresHtml = "";
      var maxSabor = sArr.length > 0 ? sArr[0].total : 1;
      for (var si = 0; si < sArr.length; si++) {
        for (var sj = 0; sj < SABORES.length; sj++) {
          if (SABORES[sj].id === sArr[si].id) {
            var pct = Math.round((sArr[si].total / d.bolis) * 100);
            var barW = Math.round((sArr[si].total / maxSabor) * 100);
            saboresHtml += '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:16px;width:24px;text-align:center">'+SABORES[sj].emoji+'</span><span style="flex:1;font-size:11px;font-weight:700">'+SABORES[sj].nombre+'</span><span style="color:#6BCB77;font-weight:800;font-size:12px;min-width:24px;text-align:right">'+sArr[si].total+'</span><span style="color:rgba(255,255,255,.3);font-size:9px;min-width:30px;text-align:right">('+pct+'%)</span></div>';
            break;
          }
        }
      }
      var div = document.createElement("div");
      div.className = "card";
      div.style.cursor = "pointer";
      div.innerHTML = '<div onclick="toggleMesDetalle(this)" style="display:flex;justify-content:space-between;align-items:center"><div><b style="font-size:13px">'+nomMes+' '+partes[0]+'</b><div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:2px">⭐ '+bestNom+(worst?(' · 👎 '+worstNom):'')+'</div></div><span style="color:#FFD93D;font-weight:900">'+cop(d.ganancia)+'</span></div><div style="display:flex;gap:12px;margin-top:4px;font-size:11px;color:rgba(255,255,255,.4)"><span>'+d.bolis+' bolis</span><span>'+d.dias+' dias</span><span>Prom: '+cop(Math.round(d.ganancia/d.dias))+'</span></div><div class="mes-det" style="display:none;margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:6px">'+saboresHtml+'</div>';
      listaMeses.appendChild(div);
    }
  }

  // --- POR SABOR ---
  var porSabor = [];
  var totalGeneral = 0;
  for (var i = 0; i < SABORES.length; i++) {
    var s = SABORES[i], total = 0;
    for (var j = 0; j < dias.length; j++) total += getDia(dias[j])[s.id] || 0;
    totalGeneral += total;
    if (total > 0) porSabor.push({nombre:s.nombre, emoji:s.emoji, total:total, ganancia:total*s.precio, precio:s.precio});
  }
  porSabor.sort(function(a,b) { return b.total - a.total; });
  var rk = document.getElementById("ranking");
  if (rk) {
    var maxTotal = porSabor.length > 0 ? porSabor[0].total : 1;
    rk.innerHTML = '<div class="ctit">🏆 Ranking de sabores</div>';
    for (var i = 0; i < porSabor.length; i++) {
      var pct = Math.round((porSabor[i].total / totalGeneral) * 100);
      var barW = Math.round((porSabor[i].total / maxTotal) * 100);
      rk.innerHTML += '<div style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px;width:28px;text-align:center">'+porSabor[i].emoji+'</span><span style="flex:1;font-size:12px;font-weight:700">'+porSabor[i].nombre+'</span><span style="color:#6BCB77;font-weight:800;font-size:13px">'+porSabor[i].total+'</span><span style="color:rgba(255,255,255,.3);font-size:10px">('+pct+'%)</span><span style="color:#FFD93D;font-weight:700;font-size:11px;min-width:50px;text-align:right">'+cop(porSabor[i].ganancia)+'</span></div><div style="margin-top:2px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,#6BCB77,#FFD93D);border-radius:2px;transition:width .3s"></div></div></div>';
    }
    rk.innerHTML += '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:rgba(255,255,255,.2)"><span>Total: '+totalGeneral+' bolis</span><span>'+cop(tg)+'</span></div>';
  }
}

var stVista = "res";
function stView(v) {
  stVista = v;
  var ids = {res:"st-resumen",mes:"st-meses",sab:"st-sabores"};
  var btns = {res:"st-res",mes:"st-mes",sab:"st-sab"};
  var secs = ["res","mes","sab"];
  for (var i = 0; i < secs.length; i++) {
    var s = secs[i];
    var el = document.getElementById(ids[s]); if (el) el.style.display = s === v ? "block" : "none";
    var btn = document.getElementById(btns[s]);
    if (btn) {
      btn.style.background = s === v ? "#FFD93D" : "rgba(255,255,255,.07)";
      btn.style.color = s === v ? "#0a0f1e" : "rgba(255,255,255,.5)";
    }
  }
}

// ============================
// FIADOS (con +/- para bolis)
// ============================
function pintarFiados() {
  var tp = 0, act = 0;
  var pendientes = [], pagados = [];
  for (var i = 0; i < fiados.length; i++) {
    var f = fiados[i];
    if (f.estado === "pendiente") { tp += f.bolis * PRECIO_BOLI; act++; pendientes.push(f); }
    else { pagados.push(f); }
  }
  var e = document.getElementById("f-pendiente"); if (e) e.textContent = cop(tp);
  e = document.getElementById("f-activos"); if (e) e.textContent = act;
  var lista = document.getElementById("lista-fiados");
  if (!lista) return;
  lista.innerHTML = "";

  var mostrar = mostrarHistorialFiados ? pagados : pendientes;

  if (mostrar.length === 0) {
    lista.innerHTML = "<div class='card' style='text-align:center;color:rgba(255,255,255,.2);padding:40px 20px;font-size:13px'>" + (mostrarHistorialFiados ? "📜 No hay historial de fiados aun" : "✅ No hay fiados pendientes") + "</div>";
    return;
  }

  for (var i = 0; i < mostrar.length; i++) {
    var f = mostrar[i];
    var debe = f.bolis * PRECIO_BOLI;
    var div = document.createElement("div");
    div.className = "boli" + (f.estado === "pagado" ? " boli-pagado" : "");

    if (f.estado === "pendiente") {
      div.innerHTML = '<div class="boli-body"><div class="boli-name">' + f.cliente + ' <span class="boli-badge pendiente">Pendiente</span></div><div class="boli-row"><div class="boli-ctrl"><button onclick="cambiarBolis('+f.id+',-1)" style="background:rgba(255,100,100,.2);color:#FF8787">−</button><div class="boli-qty">'+f.bolis+'</div><button onclick="cambiarBolis('+f.id+',1)" style="background:rgba(107,203,119,.25);color:#6BCB77">+</button></div><div class="boli-total">'+cop(debe)+'</div></div><div class="boli-actions"><button onclick="pagarFiado('+f.id+')" style="background:rgba(107,203,119,.2);border:1px solid rgba(107,203,119,.35);color:#6BCB77">✅ Pagar</button><button onclick="eliminarFiado('+f.id+')" style="background:rgba(255,100,100,.15);border:1px solid rgba(255,100,100,.3);color:#FF8787">🗑️ Eliminar</button></div></div><div class="boli-stick"></div>';
    } else {
      div.innerHTML = '<div class="boli-body"><div class="boli-name">' + f.cliente + ' <span class="boli-badge pagado">✅ Pagado</span></div><div class="boli-row"><div class="boli-qty" style="color:rgba(255,255,255,.4)">'+f.bolis+' bolis</div><div class="boli-total" style="color:rgba(107,203,119,.6)">'+cop(debe)+'</div></div><div class="boli-date">'+fechaLinda(f.fecha)+'</div></div><div class="boli-stick"></div>';
    }
    lista.appendChild(div);
  }
}

function toggleHistorialFiados() {
  mostrarHistorialFiados = !mostrarHistorialFiados;
  var btn = document.getElementById("btn-hist-fiados");
  if (btn) btn.textContent = mostrarHistorialFiados ? "🔙 Actuales" : "📜 Historial";
  pintarFiados();
}

function exportarDatos() {
  var data = {fecha:new Date().toISOString(),ventas:JSON.parse(JSON.stringify(DB)),fiados:JSON.parse(JSON.stringify(fiados))};
  var blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href = url; a.download = "bolis-de-mari-export-"+hoy()+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("✅ Datos exportados");
}

function sanitize(t) { return t.replace(/[<>&"']/g,function(c){return{"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c];}).trim().substring(0,60); }

function agregarFiado() {
  var input = document.getElementById("fiado-input");
  var cliente = sanitize(input.value);
  if (!cliente) { toast("Ingresa el nombre"); return; }
  var fiado = {cliente:cliente,bolis:0,fecha:hoy(),estado:"pendiente",id:Date.now()};
  fiados.unshift(fiado);
  guardarFiadosLocal();
  input.value = "";
  toast("Agregado: "+cliente);
  pintarFiados();
}

function cambiarBolis(id, delta) {
  for (var i = 0; i < fiados.length; i++) {
    if (fiados[i].id === id) {
      fiados[i].bolis = Math.max(0, fiados[i].bolis + delta);
      guardarFiadosLocal();
      pintarFiados();
      return;
    }
  }
}

function eliminarFiado(id) {
  for (var i = 0; i < fiados.length; i++) {
    if (fiados[i].id === id) {
      if (!confirm("Eliminar fiado de "+fiados[i].cliente+"?")) return;
      fiados.splice(i, 1);
      guardarFiadosLocal();
      toast("Fiado eliminado");
      pintarFiados();
      return;
    }
  }
}

function pagarFiado(id) {
  for (var i = 0; i < fiados.length; i++) {
    if (fiados[i].id === id) {
      if (!confirm("Pagar fiado de "+fiados[i].cliente+"?")) return;
      fiados[i].estado = "pagado";
      guardarFiadosLocal();
      toast(fiados[i].cliente+" pagado");
      pintarFiados();
      return;
    }
  }
}

// ============================
// NAVEGACION
// ============================
function pintarTodo() { pintarVentas(); if (vista==="historial") pintarHistorial(); if (vista==="stats") pintarStats(); if (vista==="fiados") pintarFiados(); }

function ir(v) {
  vista = v;
  var secs = ["ventas","historial","stats","fiados","config"];
  for (var i = 0; i < secs.length; i++) {
    var n = secs[i];
    var e = document.getElementById("v-"+n); if (e) e.style.display = n === v ? "block" : "none";
    var b = document.getElementById("nb-"+n); if (b) b.className = "nb" + (n === v ? " on" : "");
  }
  if (v==="historial") pintarHistorial();
  if (v==="stats") { pintarStats(); stView(stVista); }
  if (v==="fiados") pintarFiados();
}

try {
  cargar();
  pintarVentas();

  _err.textContent = "Error: "+e.message;
  document.body.appendChild(_err);
}
